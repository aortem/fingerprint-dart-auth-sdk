name: fingerprint_dart_auth_sdk
description: Server-side Dart SDK for FingerprintJS verification, visitor lookup, and webhook validation.
version: 0.0.5
repository: https://github.com/aortem/fingerprint-dart-auth-sdk
license: BSD-3

environment:
  sdk: ^3.11.4

# Add regular dependencies here.

dependencies:
#------------------ STANDARD FEATURES----------------------dart-----------
## There are three standard libraries.  Each one can be used with a different xxx 

  crypto: ^3.0.7
  ds_standard_features: ^0.1.6
  


#------------------ TESTING FEATURES---------------------------------

dev_dependencies:
  ds_tools_testing: ^0.1.4
  git_hooks: any
  lints: any

# Optional Local Hooks for development.
git_hooks:
  hooks:
    pre-commit: ./local_dev_tools/validate_commit.dart
    commit-msg: ./local_dev_tools/validate_commit_msg.dart
    pre-push: ./local_dev_tools/validate_branch.dart
